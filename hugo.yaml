  # ---- ABOUT ----
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I'm a Lead Systems Engineer with 20+ years of experience across site reliability
      engineering, platform operations, and observability tooling, most recently at
      **Amadeus**, working within high-availability global airline reservation infrastructure.

      My focus is on making systems observable and incidents boring: alerting-as-code with
      Prometheus and PromQL, Grafana dashboards designed for the people who actually get
      paged, git-based workflows for infrastructure changes, and clean incident routing
      through ServiceNow. I hold an MS in Computer Information Systems from Nova
      Southeastern University and an MBA from the University of Florida, and I'm a U.S.
      military veteran.

      I'm currently open to Lead/Senior SRE, Platform Engineering, and Cloud Infrastructure
      roles — remote or based in South Florida.
    skills:
      enable: true
      title: "Core tools and technologies:"
      items:
        - "Prometheus / PromQL"
        - "Grafana"
        - "Terraform"
        - "AWS"
        - "Git"
        - "ServiceNow"
        - "Kubernetes"
        - "Linux"
        - "CI/CD"
        - "Incident Response"

  # ---- EXPERIENCE ----
  # Add earlier roles below the Amadeus entry as additional "company" blocks.
  experience:
    enable: true
    items:
      - company: "Amadeus"
        companyUrl: "https://www.amadeus.com"
        jobs:
          - name: "Senior Service Reliability Engineer (SRE) - Cloud Technologies"
            date: "Jan 2019 - Mar 2026 / Mar 2020- May 2023 (Remote)"
            info:
              content: "Site reliability & platform operations for global airline reservation infrastructure"
            content: |
              Leading reliability engineering and platform operations for high-availability,
              global-scale airline reservation systems.

              - Owned reliability and operations for 460+ mission-critical production applications (reservations, 
              ticketing, inventory) serving global travel customers, consistently achieving 98–99% availability and strict SLOs in a 24/7
              high-traffic SaaS environment.
              - Spearheaded a major JIRA Epic to standardize, consolidate, and automate alerts using Prometheus, Thanos,
              PromQL, Go, and ServiceNow — significantly reduced alert noise, enabled on-the-fly Grafana dashboards, and
              improved operational efficiency across the organization.
              - Led large-scale cloud migrations from legacy physical/virtual Linux systems to private OpenShift (v3/v4) and
              public Azure, delivering zero business disruption while modernizing infrastructure and reducing operational
              overhead.
              - Drove end-to-end incident, problem, and change management using ITIL best practices; championed blameless
              postmortems and continuous improvements that enhanced system stability and recovery speed.
              - Helped developed automation scripts and tooling (Go, Shell, GitHub Actions) to reduce manual toil, accelerate
              deployments, and improve monitoring and recovery processes.
              - Trained and onboarded 25+ engineers on cloud services, incidents, and recovery best practices within a SAFe
              Agile framework.
              - Via team efforts, streamlined incident routing and response through ServiceNow, improving by at least 10% 
              the mean time to acknowledge (MTTA) and mean time to resolve (MTTR) for critical incidents, and with it also facilitating automation.

        jobs:
          - name: "Sre SRE (Unix/Linux) / Lead Systems Engineer"
            date: "Oct 2004 - Jun 2008 / Jul 2008 - Dec 2018"
            info:
              content: "Sr. and then Lead Systems Engineer of teams responsible for all production Linux/Unix systems supporting airline reservation infrastructure"
            content: |
              - Led a global 24/7 team of 9 SREs, driving mission-critical platform availability to an average of 99% for systems
              supporting the global travel industry, while directing all incident, change, and problem management using ITIL best
              practices.
              - Owned operational stability and risk management for a multi-million Euro environment spanning over 5,500
              production and test systems (HP-UX, Linux, multiple architectures), overseeing high-availability cluster operations
              (Veritas, MC/ServiceGuard) and all major OS/database upgrades.
              - Championed automation and reliability engineering, developing custom scripts and tools (Perl, PHP, HTML) to
              enhance monitoring, accelerate fault recovery, and eliminate toil, directly supporting the team’s ability to meet stringent
              availability targets.
              - Managed cross-functional technical execution, including Oracle version migrations, IBM MQ incident resolution, and
              oversight of administrative environments (Dev/Pre-Prod/Prod), ensuring coordinated, low-risk change implementation
              across the entire technology stack.

